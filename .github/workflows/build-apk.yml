name: Build EPI Tracker APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK components
        run: |
          sdkmanager --install "platforms;android-34" "build-tools;34.0.0" "platform-tools"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Build Debug APK
        run: gradle assembleDebug --no-daemon --stacktrace
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}

      - name: Find APK
        run: find . -name "*.apk" -type f

      - name: Copy and rename APK
        run: |
          find . -name "app-debug.apk" -exec cp {} EPI-Child-Tracker.apk \;

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: EPI-Child-Tracker-APK
          path: EPI-Child-Tracker.apk
          retention-days: 30

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: EPI Child Tracker v${{ github.run_number }}
          body: |
            ## EPI Child Tracker — Zambia Under-5 Immunisation

            **Download and install EPI-Child-Tracker.apk on Android phones.**

            ### Features
            - Full Zambia EPI schedule (24 doses across 11 visit groups)
            - Malaria (RTS,S) 1, 2, 3 and Booster
            - Rotavirus 3, IPV 1 & 2
            - Under 5 Card Number (PPDD-FF-YYYY-NNNN format)
            - Village and NHC/Zone registration
            - PIN security with auto-lock and activity log
            - Works 100% offline
            - Export CSV for DHIS2 or Excel

            ### Install Instructions
            1. Download EPI-Child-Tracker.apk
            2. Send to phones via WhatsApp or USB
            3. On phone: Settings → Security → Allow unknown sources
            4. Open APK and tap Install
          files: EPI-Child-Tracker.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
